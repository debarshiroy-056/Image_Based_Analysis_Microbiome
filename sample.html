<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Microbiome State</title>

<style>
body {
    font-family: Arial;
    margin: 40px;
}

h1 {
    color: #2c3e50;
}

table {
    border-collapse: collapse;
    margin-top: 20px;
}

td, th {
    border: 1px solid #ccc;
    padding: 8px 12px;
}
</style>
</head>

<body>

<h1>Microbiome State</h1>

<div id="content">Loading...</div>

<script>

// get patient id from URL
const params = new URLSearchParams(window.location.search);
const patient_id = params.get("id");

if(!patient_id){
    document.getElementById("content").innerHTML = "No patient ID provided.";
}

// load CSV
fetch("Microbiome_Master_Signatures.csv")
.then(response => response.text())
.then(data => {

    const rows = data.split("\n");
    const header = rows[0].split(",");

    let patient_row = null;

    for(let i=1;i<rows.length;i++){
        const cols = rows[i].split(",");
        if(cols[0] === patient_id){
            patient_row = cols;
            break;
        }
    }

    if(!patient_row){
        document.getElementById("content").innerHTML = "Patient not found.";
        return;
    }

    let html = `<h2>Patient: ${patient_id}</h2>`;
    html += "<table>";
    html += "<tr><th>Grid</th><th>PC1 Value</th></tr>";

    for(let i=1;i<header.length;i++){
        html += `<tr>
                    <td>${header[i]}</td>
                    <td>${patient_row[i]}</td>
                </tr>`;
    }

    html += "</table>";

    document.getElementById("content").innerHTML = html;

});

</script>

</body>
</html>
